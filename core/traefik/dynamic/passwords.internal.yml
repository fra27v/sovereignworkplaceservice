http:
  routers:
    passwords-internal:
      rule: "Host(`passwords.internal`)"
      entryPoints:
        - websecure
      tls: {}
      service: passwords-internal-svc

  services:
    passwords-internal-svc:
      loadBalancer:
        passHostHeader: true
        serversTransport: internal-ca
        servers:
          - url: "https://vaultwarden:443"